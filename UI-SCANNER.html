  <station>BIR</station>
  <code>φ</code>
  <task>Iteration ausführen</task>

  <pipeline>
    P4 → P1 → P2 → Pe
  </pipeline>

  <input>
    value = {{INPUT}}

    step_P1 = melt(step_P4)
    step_P2 = merge(step_P1)
    result  = φ(step_P2)

  <output>
    iteration = {{RESULT}}
  </output>

  <return>
    SEEu.md ← {{RESULT}}
  </return>

</section>
